                        // pad by copying (just in case)
                        let original = [...allRings];
                        while (allRings.length < 80) {
                            allRings.push({ ...original[allRings.length % original.length], name: allRings.length + ' ' + original[allRings.length % original.length].name });
                        }
                    }
                    populateFilters(allRings);
                    applyFilters();
                },
                error: (err) => {
                    gridEl.innerHTML = '<div class="no-products">Error loading rings. Please check CSV.</div>';
                }
            });
        }

        // Populate filter dropdowns with unique values from data
        function populateFilters(rings) {
            const metals = new Set();
            const gems = new Set();
            rings.forEach(r => {
                if (r.metal) metals.add(r.metal.trim());
                if (r.gemstone) gems.add(r.gemstone.trim());
            });
            // sort & populate metal
            metalSelect.innerHTML = '<option value="all">All metals</option>';
            [...metals].sort().forEach(m => {
                metalSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
            gemSelect.innerHTML = '<option value="all">All stones</option>';
            [...gems].sort().forEach(g => {
                gemSelect.innerHTML += `<option value="${g}">${g}</option>`;
            });
        }

        // Filter & render
        function applyFilters() {
            const metal = metalSelect.value;
            const gem = gemSelect.value;
            const query = searchInput.value.toLowerCase().trim();

            filteredRings = allRings.filter(ring => {
                if (metal !== 'all' && ring.metal !== metal) return false;
                if (gem !== 'all' && ring.gemstone !== gem) return false;
                if (query) {
                    return ring.name.toLowerCase().includes(query) || ring.description.toLowerCase().includes(query);
                }
                return true;
            });

            renderGrid(filteredRings);
        }

        function renderGrid(rings) {
            if (!rings.length) {
                gridEl.innerHTML = '<div class="no-products">✨ no rings match your selection</div>';
                return;
            }
            let html = '';
            rings.forEach((ring, idx) => {
                html += `
                    <div class="product-card" data-index="${idx}" data-name="${ring.name}" data-metal="${ring.metal}" data-gem="${ring.gemstone}" data-desc="${ring.description}" data-price="${ring.price}" data-img="${ring.image}">
                        <img src="${ring.image}" alt="${ring.name}" class="card-image" loading="lazy">
                        <div class="card-name">${ring.name}</div>
                        <div class="card-desc">${ring.description.substring(0,70)}${ring.description.length>70?'…':''}</div>
                        <div class="card-details">
                            <span>${ring.metal}</span>
                            <span>${ring.gemstone}</span>
                        </div>
                        <div class="card-price">$${ring.price}</div>
                        <button class="inquiry-btn" data-inquiry="${ring.name}">Inquiry</button>
                    </div>
                `;
            });
            gridEl.innerHTML = html;

            // attach event listeners to cards (lightbox)
            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('inquiry-btn')) {
                        e.stopPropagation();
                        const ringName = e.target.dataset.inquiry;
                        window.location.href = `mailto:info@arshadjewelers.com?subject=Inquiry%20about%20${encodeURIComponent(ringName)}`;
                        return;
                    }
                    // lightbox
                    const idx = card.dataset.index;
                    const ring = filteredRings[idx];
                    if (ring) openLightbox(ring);
                });
                // inquiry button inside card
                const btn = card.querySelector('.inquiry-btn');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const ringName = btn.dataset.inquiry;
                    window.location.href = `mailto:info@arshadjewelers.com?subject=Inquiry%20about%20${encodeURIComponent(ringName)}`;
                });
            });
        }

        function openLightbox(ring) {
            modalImg.src = ring.image;
            modalName.innerText = ring.name;
            modalMetal.innerText = ring.metal;
            modalGem.innerText = ring.gemstone;
            modalDesc.innerText = ring.description;
            modalPrice.innerText = `$${ring.price}`;
            modalInquiry.onclick = () => {
                window.location.href = `mailto:info@arshadjewelers.com?subject=Inquiry%20about%20${encodeURIComponent(ring.name)}`;
            };
            modal.classList.add('active');
        }

        // close modal
        closeModal.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        // event listeners for filters
        metalSelect.addEventListener('change', applyFilters);
        gemSelect.addEventListener('change', applyFilters);
        searchInput.addEventListener('input', applyFilters);
        clearBtn.addEventListener('click', () => {
            metalSelect.value = 'all';
            gemSelect.value = 'all';
            searchInput.value = '';
            applyFilters();
        });

        // start
        loadRings();
    })();
</script>
<!-- Important: create rings.csv in same folder with your own 80 rings using the same headers.
     This demo includes a built‑in collection of 48+ rings (expandable). -->
